version: "3.8"

services:
  k3s-server:
    image: rancher/k3s:v1.30.0-k3s1
    container_name: k3s-server
    privileged: true
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
      - K3S_TOKEN=mysecret
    command: server --disable=servicelb
    ports:
      - "6443:6443"   # Kubernetes API
      - "80:80"       # HTTP (Ingress / Traefik)
      - "443:443"     # HTTPS
    volumes:
      - ./k3s-server-data:/var/lib/rancher/k3s
      - ./output:/output
      - /var/run/docker.sock:/var/run/docker.sock

  k3s-agent:
    image: rancher/k3s:v1.30.0-k3s1
    container_name: k3s-agent
    privileged: true
    depends_on:
      - k3s-server
    environment:
      - K3S_URL=https://k3s-server:6443
      - K3S_TOKEN=mysecret
    command: agent
    volumes:
      - ./k3s-agent-data:/var/lib/rancher/k3s
      - /var/run/docker.sock:/var/run/docker.sock

  mockexams:
    build:
      context: ./MockExams
    container_name: mockexams-app
    depends_on:
      - k3s-server
    environment:
      - KUBECONFIG=/output/kubeconfig.yaml
      - K8S_API_ENDPOINT=https://k3s-server:6443
    ports:
      - "8080:8080"
    volumes:
      - ./output:/output:ro