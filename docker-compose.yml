# App container: expects a local kubeconfig from minikube (scripts/minikube-up.cmd -> output/kubeconfig.yaml).
# Start minikube on the host before: docker compose up

version: "3.8"

services:
  mockexams:
    build:
      context: ./MockExams
    container_name: mockexams-app
    environment:
      - KUBECONFIG=/output/kubeconfig.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./output:/output:ro
